name: Deploy Web Preview

on:
  push:
    branches:
      - web-preview
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-web-preview
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: |
          flutter build web --release \
            --base-href "/AYG/" \
            --target lib/main_web.dart \
            --dart-define=SUPABASE_URL=${{ vars.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ vars.SUPABASE_PUBLISHABLE_KEY }} \
            --dart-define=GOOGLE_WEB_CLIENT_ID=${{ vars.GOOGLE_WEB_CLIENT_ID }} \
            --dart-define=OFF_CONTACT_EMAIL=${{ vars.OFF_CONTACT_EMAIL }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
